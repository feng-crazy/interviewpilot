<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简历上传弹窗 - 视觉稿</title>
  <style>
    :root {
      --color-primary-50: #eff6ff;
      --color-primary-100: #dbeafe;
      --color-primary-200: #bfdbfe;
      --color-primary-300: #93c5fd;
      --color-primary-400: #60a5fa;
      --color-primary-500: #3b82f6;
      --color-primary-600: #2563eb;
      --color-primary-700: #1d4ed8;
      --color-primary-800: #1e40af;
      --color-primary-900: #1e3a8a;

      --color-gray-50: #f9fafb;
      --color-gray-100: #f3f4f6;
      --color-gray-200: #e5e7eb;
      --color-gray-300: #d1d5db;
      --color-gray-400: #9ca3af;
      --color-gray-500: #6b7280;
      --color-gray-600: #4b5563;
      --color-gray-700: #374151;
      --color-gray-800: #1f2937;
      --color-gray-900: #111827;

      --color-success-500: #10b981;
      --color-success-600: #059669;
      --color-warning-500: #f59e0b;
      --color-warning-600: #d97706;
      --color-error-500: #ef4444;
      --color-error-600: #dc2626;

      --surface: #ffffff;
      --page-bg: #f9fafb;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);

      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --spacing-2xl: 48px;
      --spacing-3xl: 64px;

      --transition-fast: 150ms ease;
      --transition-normal: 200ms ease;
      --transition-slow: 300ms ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      font-weight: 400;
      background: var(--page-bg);
      color: var(--color-gray-900);
      min-height: 100vh;
    }

    /* Background page mockup */
    .background-page {
      padding: var(--spacing-xl);
      filter: blur(2px);
      opacity: 0.7;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 var(--spacing-xl);
      height: 64px;
      background: var(--surface);
      border-bottom: 1px solid var(--color-gray-200);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--spacing-xl);
    }

    .navbar-logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--color-primary-600);
      letter-spacing: -0.02em;
    }

    .navbar-links {
      display: flex;
      gap: var(--spacing-sm);
    }

    .navbar-link {
      padding: var(--spacing-sm) var(--spacing-md);
      color: var(--color-gray-600);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: var(--radius-md);
    }

    .page-content {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--color-gray-200);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-sm);
    }

    .card-elevated {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: var(--spacing-lg);
      box-shadow: var(--shadow-lg);
    }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: var(--spacing-md);
    }

    /* Modal Card */
    .modal-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow: hidden;
      animation: modalIn var(--transition-slow);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Modal Header */
    .modal-header {
      padding: var(--spacing-lg) var(--spacing-xl);
      border-bottom: 1px solid var(--color-gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--color-gray-900);
    }

    .modal-close {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: var(--spacing-xs);
      border-radius: var(--radius-md);
      color: var(--color-gray-400);
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: var(--color-gray-100);
      color: var(--color-gray-600);
    }

    /* Modal Body */
    .modal-body {
      padding: var(--spacing-xl);
      overflow-y: auto;
      max-height: calc(90vh - 140px);
    }

    /* Tabs */
    .tab-list {
      display: flex;
      gap: var(--spacing-xs);
      padding: var(--spacing-xs);
      background: var(--color-gray-100);
      border-radius: var(--radius-lg);
      margin-bottom: var(--spacing-lg);
    }

    .tab-button {
      flex: 1;
      padding: var(--spacing-sm) var(--spacing-lg);
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-gray-600);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .tab-button:hover {
      background: var(--color-gray-200);
    }

    .tab-button.active {
      background: var(--surface);
      color: var(--color-gray-900);
      box-shadow: var(--shadow-sm);
    }

    /* Upload Zone */
    .upload-zone {
      border: 2px dashed var(--color-gray-300);
      border-radius: var(--radius-lg);
      padding: var(--spacing-2xl);
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      background: var(--color-gray-50);
    }

    .upload-zone:hover {
      border-color: var(--color-primary-400);
      background: var(--color-primary-50);
    }

    .upload-zone.dragover {
      border-color: var(--color-primary-500);
      background: var(--color-primary-100);
    }

    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto var(--spacing-md);
      color: var(--color-gray-400);
    }

    .upload-zone:hover .upload-icon {
      color: var(--color-primary-500);
    }

    .upload-text {
      font-size: 0.875rem;
      color: var(--color-gray-600);
      margin-bottom: var(--spacing-xs);
    }

    .upload-hint {
      font-size: 0.75rem;
      color: var(--color-gray-400);
    }

    .upload-input {
      display: none;
    }

    /* File Preview */
    .file-preview {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      background: var(--color-primary-50);
      border: 1px solid var(--color-primary-200);
      border-radius: var(--radius-md);
      margin-top: var(--spacing-md);
    }

    .file-icon {
      width: 40px;
      height: 40px;
      background: var(--color-primary-500);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.25rem;
    }

    .file-info {
      flex: 1;
    }

    .file-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-gray-900);
    }

    .file-size {
      font-size: 0.75rem;
      color: var(--color-gray-500);
    }

    .file-remove {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: var(--spacing-xs);
      border-radius: var(--radius-md);
      color: var(--color-gray-400);
      transition: all var(--transition-fast);
    }

    .file-remove:hover {
      background: var(--color-error-100);
      color: var(--color-error-500);
    }

    /* Text Input */
    .textarea {
      background: var(--surface);
      border: 1px solid var(--color-gray-300);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      width: 100%;
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--color-gray-900);
      transition: all var(--transition-fast);
      resize: vertical;
      min-height: 200px;
      font-family: inherit;
    }

    .textarea:hover {
      border-color: var(--color-gray-400);
    }

    .textarea:focus {
      outline: none;
      border-color: var(--color-primary-500);
      box-shadow: 0 0 0 3px var(--color-primary-100);
    }

    .textarea::placeholder {
      color: var(--color-gray-400);
    }

    /* Optional Section */
    .optional-section {
      margin-top: var(--spacing-xl);
      padding-top: var(--spacing-xl);
      border-top: 1px solid var(--color-gray-200);
    }

    .optional-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-md);
      cursor: pointer;
    }

    .optional-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-gray-700);
    }

    .optional-badge {
      font-size: 0.75rem;
      color: var(--color-gray-400);
      background: var(--color-gray-100);
      padding: var(--spacing-xs) var(--spacing-sm);
      border-radius: var(--radius-full);
    }

    .chevron {
      width: 16px;
      height: 16px;
      color: var(--color-gray-400);
      transition: transform var(--transition-fast);
      margin-left: auto;
    }

    .chevron.expanded {
      transform: rotate(180deg);
    }

    .optional-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xs);
    }

    .form-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--color-gray-600);
    }

    .form-input {
      background: var(--surface);
      border: 1px solid var(--color-gray-300);
      border-radius: var(--radius-md);
      padding: var(--spacing-sm) var(--spacing-md);
      font-size: 0.875rem;
      color: var(--color-gray-900);
      transition: all var(--transition-fast);
    }

    .form-input:hover {
      border-color: var(--color-gray-400);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-primary-500);
      box-shadow: 0 0 0 3px var(--color-primary-100);
    }

    .form-hint {
      font-size: 0.75rem;
      color: var(--color-gray-400);
    }

    /* Modal Footer */
    .modal-footer {
      padding: var(--spacing-lg) var(--spacing-xl);
      border-top: 1px solid var(--color-gray-200);
      display: flex;
      justify-content: flex-end;
      gap: var(--spacing-md);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      background: var(--color-primary-600);
      color: white;
      border: none;
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.5;
      transition: all var(--transition-fast);
      text-decoration: none;
    }

    .button:hover:not(:disabled) {
      background: var(--color-primary-700);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .button:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: var(--shadow-sm);
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .button-secondary {
      background: var(--color-gray-100);
      color: var(--color-gray-700);
    }

    .button-secondary:hover:not(:disabled) {
      background: var(--color-gray-200);
    }

    .button-lg {
      padding: var(--spacing-md) var(--spacing-xl);
    }

    /* Tab Content */
    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .modal-card {
        max-width: 100%;
        max-height: 100vh;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        margin-top: auto;
      }

      .modal-body {
        max-height: calc(100vh - 140px);
      }

      .optional-content {
        grid-template-columns: 1fr;
      }

      .upload-zone {
        padding: var(--spacing-xl);
      }
    }
  </style>
</head>
<body>
  <!-- Background Page Mockup -->
  <div class="background-page">
    <nav class="navbar">
      <div class="navbar-logo">InterviewPilot</div>
      <div class="navbar-links">
        <span class="navbar-link">首页</span>
        <span class="navbar-link">配置</span>
        <span class="navbar-link">历史</span>
      </div>
    </nav>
    <div class="page-content">
      <div class="card card-elevated">
        <h2 style="margin-bottom: 16px;">岗位详情</h2>
        <p style="color: #6b7280; font-size: 0.875rem;">高级前端工程师 | 阿里巴巴</p>
        <div style="margin-top: 24px; padding: 16px; background: #f9fafb; border-radius: 8px;">
          <p style="font-size: 0.875rem;">负责淘宝首页核心模块开发...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay">
    <div class="modal-card">
      <!-- Modal Header -->
      <div class="modal-header">
        <h2 class="modal-title">准备面试</h2>
        <button class="modal-close" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body">
        <!-- Tabs -->
        <div class="tab-list">
          <button class="tab-button active" data-tab="upload">上传简历</button>
          <button class="tab-button" data-tab="manual">手动输入</button>
        </div>

        <!-- Upload Tab -->
        <div class="tab-content active" id="tab-upload">
          <div class="upload-zone" id="uploadZone">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <p class="upload-text">点击或拖拽文件到此处上传</p>
            <p class="upload-hint">支持 PDF、DOCX 格式，最大 10MB</p>
            <input type="file" class="upload-input" id="fileInput" accept=".pdf,.docx" />
          </div>

          <!-- File Preview (shown when file selected) -->
          <div class="file-preview" id="filePreview" style="display: none;">
            <div class="file-icon">📄</div>
            <div class="file-info">
              <div class="file-name" id="fileName">张三_前端工程师_简历.pdf</div>
              <div class="file-size" id="fileSize">2.4 MB</div>
            </div>
            <button class="file-remove" id="removeFile" aria-label="删除文件">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>

        <!-- Manual Input Tab -->
        <div class="tab-content" id="tab-manual">
          <textarea class="textarea" placeholder="请在此粘贴简历内容...

示例格式：
姓名：张三
工作经验：5年
技能：React、TypeScript、Node.js...
项目经历：...
"></textarea>
        </div>

        <!-- Optional Constraints Section -->
        <div class="optional-section">
          <div class="optional-header" id="toggleOptional">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-gray-400);">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <span class="optional-title">高级设置</span>
            <span class="optional-badge">可选</span>
            <svg class="chevron" id="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="optional-content" id="optionalContent" style="display: none;">
            <div class="form-group">
              <label class="form-label">最大问题数</label>
              <input type="number" class="form-input" placeholder="10" min="1" max="50" />
              <span class="form-hint">默认: 10</span>
            </div>
            <div class="form-group">
              <label class="form-label">最大时长（分钟）</label>
              <input type="number" class="form-input" placeholder="30" min="5" max="180" />
              <span class="form-hint">默认: 30</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <button class="button button-secondary">取消</button>
        <button class="button button-lg" id="confirmBtn">确认开始</button>
      </div>
    </div>
  </div>

  <script>
    // Tab switching
    const tabButtons = document.querySelectorAll('.tab-button');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(button => {
      button.addEventListener('click', () => {
        const tab = button.dataset.tab;
        
        tabButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        
        tabContents.forEach(content => {
          content.classList.remove('active');
          if (content.id === `tab-${tab}`) {
            content.classList.add('active');
          }
        });
      });
    });

    // Optional section toggle
    const toggleOptional = document.getElementById('toggleOptional');
    const optionalContent = document.getElementById('optionalContent');
    const chevron = document.getElementById('chevron');

    toggleOptional.addEventListener('click', () => {
      const isExpanded = optionalContent.style.display !== 'none';
      optionalContent.style.display = isExpanded ? 'none' : 'grid';
      chevron.classList.toggle('expanded', !isExpanded);
    });

    // File upload simulation
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const filePreview = document.getElementById('filePreview');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeFile = document.getElementById('removeFile');
    const confirmBtn = document.getElementById('confirmBtn');

    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        showFilePreview(files[0]);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        showFilePreview(e.target.files[0]);
      }
    });

    function showFilePreview(file) {
      fileName.textContent = file.name;
      fileSize.textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
      filePreview.style.display = 'flex';
      confirmBtn.disabled = false;
    }

    removeFile.addEventListener('click', () => {
      filePreview.style.display = 'none';
      fileInput.value = '';
      confirmBtn.disabled = true;
    });

    // Initialize confirm button as disabled
    confirmBtn.disabled = true;
  </script>
</body>
</html>
